<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Aligner Portal</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0b0f1a;
    color:white;
}

/* NAV */
nav{
    background:#111827;
    padding:15px;
    text-align:center;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

/* INPUT */
input, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

button{
    background:#00c3ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00a3cc;
}

/* VIDEO */
video{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.badge{
    background:#00c3ff;
    color:black;
    padding:5px 10px;
    border-radius:8px;
    display:inline-block;
    margin-bottom:10px;
}
</style>
</head>

<body>

<nav>
<h2>Elite Aligner System</h2>
</nav>

<div class="container" id="app">

<!-- ADMIN -->
<div id="adminPage" style="display:none">
    <div class="card">
        <span class="badge">Create Case</span>

        <input id="name" placeholder="Patient Name">
        <input type="file" id="video">
        <input type="file" id="stl">
        <input type="file" id="images" multiple>

        <button onclick="createCase()">Create Case</button>

        <p id="status"></p>
    </div>
</div>

<!-- CASE VIEW -->
<div id="casePage" style="display:none">
    <div class="card">
        <span class="badge">Case Viewer</span>
        <h3 id="caseId"></h3>
        <p id="info">Loading...</p>
    </div>

    <div class="card">
        <span class="badge">Video</span>
        <video id="video" controls></video>
    </div>

    <div class="card">
        <span class="badge">Images</span>
        <div id="images"></div>
    </div>

    <div class="card">
        <span class="badge">3D Model</span>
        <p>STL Viewer (next upgrade)</p>
    </div>
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* 🔴 PUT YOUR KEYS HERE */
const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_ANON_KEY";

const supabase = createClient(supabaseUrl, supabaseKey);

/* ROUTING */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* SHOW PAGE */
if(id){
    document.getElementById("casePage").style.display = "block";
    loadCase(id);
}else{
    document.getElementById("adminPage").style.display = "block";
}

/* CREATE CASE */
window.createCase = async function(){

    const name = document.getElementById("name").value;
    const video = document.getElementById("video").files[0];

    document.getElementById("status").innerText = "Creating...";

    try{

        let videoUrl = "";

        if(video){
            const { data } = await supabase.storage
                .from("cases")
                .upload(`video/${Date.now()}_${video.name}`, video);

            videoUrl = supabase.storage
                .from("cases")
                .getPublicUrl(data.path).data.publicUrl;
        }

        const { data, error } = await supabase.rpc("create_case", {
            patient_name: name,
            video_url: videoUrl
        });

        if(error) throw error;

        const caseCode = data[0].case_code;

        document.getElementById("status").innerHTML =
        "Case Created: <br><a href='?id="+caseCode+"'>Open Case</a>";

    }catch(err){
        document.getElementById("status").innerText = err.message;
    }
}

/* LOAD CASE */
async function loadCase(caseId){

    document.getElementById("caseId").innerText = "Case: " + caseId;

    // لاحقًا نربطه بقاعدة البيانات
    document.getElementById("info").innerText =
    "Case loaded (backend ready for full integration)";
}

</script>

</body>
</html>
