<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Elite Aligner</title>

<style>
body{
    font-family: Arial;
    background:#0b0f1a;
    color:white;
    text-align:center;
    margin-top:100px;
}

button{
    padding:15px 25px;
    font-size:18px;
    background:#00c3ff;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#0099cc;
}

a{
    color:#00ffcc;
    display:block;
    margin-top:20px;
}

.card{
    background:#111827;
    padding:30px;
    border-radius:15px;
    width:300px;
    margin:auto;
}
</style>

</head>
<body>

<div id="app"></div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const app = document.getElementById("app");

if(id){
    app.innerHTML = `
        <div class="card">
            <h2>Patient Portal</h2>
            <p>Case ID:</p>
            <h3>${id}</h3>
            <p>سيتم عرض الحالة هنا</p>
        </div>
    `;
} else {
    app.innerHTML = `
        <h1>Elite Aligner</h1>
        <p>Generate Patient Link</p>

        <button onclick="generateLink()">توليد رابط</button>

        <div id="result"></div>
    `;
}

function generateLink(){
    let newId = Math.random().toString(36).substring(2,10);
    let link = window.location.origin + "?id=" + newId;

    document.getElementById("result").innerHTML =
        `<a href="${link}" target="_blank">${link}</a>`;

    navigator.clipboard.writeText(link);
    alert("تم نسخ الرابط!");
}
</script>

</body>
</html>
